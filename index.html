<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>💊Registro Spese Personali</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <h1 id="titolo">Caricamento...</h1>
            <button onclick="logout()" style="background:#e74c3c; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>

        <div class="form-box">
            <input type="date" id="data">
            <input type="text" id="descrizione" placeholder="Cosa hai comprato?">
            <input type="number" id="importo" placeholder="Prezzo €" step="0.01">
            <select id="categoria">
                <option value="Farmaci">Farmaci</option>
                <option value="Visita">Visita</option>
                <option value="Esami">Esami</option>
            </select>
            <label><input type="checkbox" id="rimborsabile"> Rimborsabile</label>
            <button onclick="salvaSpesa()">Aggiungi</button>
        </div>

        <table>
            <thead>
                <tr><th>Data</th><th>Descrizione</th><th>Categoria</th><th>Prezzo</th><th>Rimb.</th><th>Azioni</th></tr>
            </thead>
            <tbody id="tabellaCorpo"></tbody>
        </table>
        <h2>Totale: <span id="valoreTotale">0.00</span> €</h2>
    </div>

    <script>
        const nome = localStorage.getItem('user_nome');
        const email = localStorage.getItem('user_email');

        // FUNZIONE: controllo login
        if(!nome || !email) window.location.href = 'login.html';
        document.getElementById('titolo').innerText = `Spese di ${nome}`;

        // FUNZIONE: logout
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        // FUNZIONE: caricaTabella
        // Scopo: Recupera le spese dal server filtrandole per l'email dell'utente attuale
        async function caricaTabella() {
            const res = await fetch(`/api/spese?email=${encodeURIComponent(email)}`);
            const spese = await res.json();
            const corpo = document.getElementById('tabellaCorpo');
            corpo.innerHTML = '';
            let totale = 0;
            spese.forEach(s => {
                totale += parseFloat(s.importo);
                corpo.innerHTML += `<tr>
                    <td>${s.data}</td><td>${s.descrizione}</td><td>${s.categoria}</td>
                    <td>${parseFloat(s.importo).toFixed(2)} €</td>
                    <td>${s.rimborsabile ? '✅' : '❌'}</td>
                    <td><button onclick="eliminaSpesa(${s.id})" style="background:#e74c3c; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">Elimina</button></td>
                </tr>`;
            });
            document.getElementById('valoreTotale').innerText = totale.toFixed(2);
        }

        // FUNZIONE: salvaSpesa
        // Scopo: Invia i dati al server includendo utente ed email per il salvataggio nel JSON
        async function salvaSpesa() {
            const dataVal = document.getElementById('data').value;
            const impVal = document.getElementById('importo').value;
            
            if(!dataVal || !impVal) return alert("Compila i campi obbligatori!");

            const spesa = {
                utente: nome,
                email: email,
                data: dataVal,
                descrizione: document.getElementById('descrizione').value,
                importo: parseFloat(impVal),
                categoria: document.getElementById('categoria').value,
                rimborsabile: document.getElementById('rimborsabile').checked
            };

            await fetch('/api/spese', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(spesa)
            });
            
            // Pulisce il form
            document.getElementById('descrizione').value = '';
            document.getElementById('importo').value = '';
            caricaTabella();
        }

        // FUNZIONE: eliminaSpesa
        async function eliminaSpesa(id) {
            if(confirm('Eliminare la spesa?')) {
                await fetch(`/api/spese/${id}`, { method: 'DELETE' });
                caricaTabella();
            }
        }

        caricaTabella();
    </script>
</body>
</html>
