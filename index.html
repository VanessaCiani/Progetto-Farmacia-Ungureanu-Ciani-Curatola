<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gestione Farmacia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💊 Registro Farmacia</h1>
        
        <div class="form-box">
            <input type="date" id="data">
            <input type="text" id="descrizione" placeholder="Cosa hai comprato?">
            <input type="number" id="importo" placeholder="Prezzo €" step="0.01">
            <select id="categoria">
                <option value="Farmaci">Farmaci</option>
                <option value="Visita">Visita</option>
                <option value="Esami">Esami</option>
            </select>
            <label><input type="checkbox" id="rimborsabile"> Rimborsabile</label>
            <button onclick="salvaSpesa()">Aggiungi Spesa</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Data</th><th>Descrizione</th><th>Categoria</th><th>Prezzo</th><th>Rimb.</th><th>Azioni</th>
                </tr>
            </thead>
            <tbody id="tabellaCorpo"></tbody>
        </table>
        <h2>Totale: <span id="valoreTotale">0.00</span> €</h2>
    </div>

    <script>
        //FUNZIONE: caricaTabella
        //Scopo: Chiede al server i dati JSON e li mostra nella tabella HTML
        //Richiamata all'avvio (Riga 115) e dopo ogni modifica ai dati
        async function caricaTabella() {
            // Chiama l'endpoint GET del server (server.js -> riga 23)
            const risposta = await fetch('/api/spese');
            const dati = await risposta.json();
            
            const corpo = document.getElementById('tabellaCorpo');
            let somma = 0;
            
            corpo.innerHTML = ''; // Svuota la tabella prima di ricaricarla
            
            dati.forEach(s => {
                somma += parseFloat(s.importo);
                // Crea una riga per ogni spesa nel database
                corpo.innerHTML += `
                    <tr>
                        <td>${s.data}</td>
                        <td>${s.descrizione}</td>
                        <td>${s.categoria}</td>
                        <td>${parseFloat(s.importo).toFixed(2)} €</td>
                        <td>${s.rimborsabile ? 'SI' : 'NO'}</td>
                        <td><button onclick="eliminaSpesa(${s.id})">Elimina</button></td>
                    </tr>`;
            });
            document.getElementById('valoreTotale').innerText = somma.toFixed(2);
        }

        //FUNZIONE: salvaSpesa
        //Scopo: Legge i dati dal form e li invia al server per il salvataggio
        //Richiamata dal click sul bottone "Aggiungi Spesa" (Riga 26)
        async function salvaSpesa() {
            // Raccoglie i valori inseriti dall'utente negli input HTML
            const nuova = {
                data: document.getElementById('data').value,
                descrizione: document.getElementById('descrizione').value,
                importo: document.getElementById('importo').value,
                categoria: document.getElementById('categoria').value,
                rimborsabile: document.getElementById('rimborsabile').checked
            };

            //Validazione base
            if(!nuova.data || !nuova.descrizione || !nuova.importo) return alert("Dati mancanti!");

            //Invia i dati al server tramite l'endpoint POST (server.js -> riga 30)
            const response = await fetch('/api/spese', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(nuova)
            });

            if (!response.ok) {
                const errorText = await response.text();
                return alert('Errore durante il salvataggio: ' + errorText);
            }

            //Resetta i campi del form dopo il salvataggio
            document.getElementById('data').value = '';
            document.getElementById('descrizione').value = '';
            document.getElementById('importo').value = '';
            document.getElementById('categoria').selectedIndex = 0;
            document.getElementById('rimborsabile').checked = false;

            caricaTabella(); //Dopo il salvataggio, aggiorna la vista
        }

        //FUNZIONE: eliminaSpesa
        //Scopo: Invia una richiesta di eliminazione al server per un ID specifico
        //Richiamata dal bottone "Elimina" all'interno della tabella (Riga 62)
        async function eliminaSpesa(id) {
            if (!confirm('Sei sicuro di voler eliminare questa spesa?')) return;
            //Chiama l'endpoint DELETE del server (server.js -> riga 48)
            const response = await fetch(`/api/spese/${id}`, { method: 'DELETE' });
            if (!response.ok) {
                const errorText = await response.text();
                return alert('Errore durante l\'eliminazione: ' + errorText);
            }
            caricaTabella(); //Aggiorna la vista dopo l'eliminazione
        }

        //Avvia il caricamento dei dati non appena la pagina viene aperta
        caricaTabella();
    </script>
</body>
</html>
